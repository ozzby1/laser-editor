<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTOENGRAVING</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#0a0a0f;
  color:#e2e8f0;
  font-family:'Inter',sans-serif;
}

/* PANELY */
.panel{
  background:#0f1117;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  backdrop-filter:blur(10px);
}

/* CANVAS */
canvas{
  max-width:100%;
  background:#000;
}

/* WRAP */
.canvas-wrap{
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  background:#000;
  min-height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ZOOM */
.zoom-hover canvas{
  transition:transform .35s ease;
}
.zoom-hover:hover canvas{
  transform:scale(1.06);
}

/* POROVNÁNÍ */
.compare-result-wrap{
  border:1px solid rgba(249,115,22,0.35);
  box-shadow:0 0 0 1px rgba(249,115,22,0.15),
             0 8px 24px rgba(249,115,22,0.15);
}

.compare-title{
  font-size:.72rem;
  text-align:center;
  margin-bottom:8px;
  font-weight:600;
}
.compare-title.orig{color:#94a3b8;}
.compare-title.result{color:#f97316;}

/* BUTTON */
.view-btn{
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
  padding:6px 14px;
  border-radius:8px;
}
.view-btn.active{
  background:#f97316;
  color:white;
}
</style>
</head>

<body class="p-4">

<div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-4">

<!-- PREVIEW -->
<div class="lg:col-span-2 flex flex-col gap-3">

<div class="panel p-3 flex gap-2">
<button id="btnResult" class="view-btn active">Výsledek</button>
<button id="btnCompare" class="view-btn">Porovnání</button>
</div>

<div class="panel p-4">

<div id="canvasArea" style="display:none">

<div id="resultView">
<div class="zoom-hover canvas-wrap">
<canvas id="canvasSingle"></canvas>
</div>
</div>

<div id="compareView" style="display:none">
<div class="grid md:grid-cols-2 gap-4">

<div>
<div class="compare-title orig">Originál</div>
<div class="zoom-hover canvas-wrap">
<canvas id="canvasCompareOrig"></canvas>
</div>
</div>

<div>
<div class="compare-title result">Výsledek</div>
<div class="zoom-hover canvas-wrap compare-result-wrap">
<canvas id="canvasCompareResult"></canvas>
</div>
</div>

</div>
</div>

</div>

<div id="emptyState" class="text-center py-20 text-gray-500">
Nahraj obrázek
</div>

</div>
</div>

<!-- TOOLY -->
<div class="flex flex-col gap-3">

<div class="panel p-4">
<input type="file" id="fileInput">
</div>

<div class="panel p-4">
<label>Styl gravírování</label>
<select id="ditherMode" class="w-full mt-2">
<option value="floyd">Detailní</option>
<option value="atkinson">Kontrastní</option>
</select>
</div>

<div class="panel p-4">
<label>DPI</label>
<select id="dpi" class="w-full mt-2">
<option>254</option>
<option>300</option>
</select>
</div>

<button id="downloadBtn" class="bg-orange-500 p-3 rounded-lg">
Stáhnout
</button>

</div>

</div>

<script>
let originalImage=null;
let viewMode='result';

const canvasSingle=document.getElementById('canvasSingle');
const canvasCompareOrig=document.getElementById('canvasCompareOrig');
const canvasCompareResult=document.getElementById('canvasCompareResult');

document.getElementById('btnResult').onclick=()=>setView('result');
document.getElementById('btnCompare').onclick=()=>setView('compare');

function setView(m){
viewMode=m;
document.getElementById('resultView').style.display=m==='result'?'block':'none';
document.getElementById('compareView').style.display=m==='compare'?'block':'none';
}

document.getElementById('fileInput').onchange=e=>{
const file=e.target.files[0];
const img=new Image();
img.onload=()=>{
originalImage=img;
document.getElementById('emptyState').style.display='none';
document.getElementById('canvasArea').style.display='block';
process();
};
img.src=URL.createObjectURL(file);
};

function process(){
const w=800;
const h=originalImage.height*w/originalImage.width;

draw(canvasCompareOrig,originalImage,w,h);

const c=document.createElement('canvas');
c.width=w;c.height=h;
const ctx=c.getContext('2d');
ctx.drawImage(originalImage,0,0,w,h);

let img=ctx.getImageData(0,0,w,h);
dither(img);

put(canvasCompareResult,img,w,h);
put(canvasSingle,img,w,h);
}

function draw(c,img,w,h){
c.width=w;c.height=h;
c.getContext('2d').drawImage(img,0,0,w,h);
}

function put(c,data,w,h){
c.width=w;c.height=h;
c.getContext('2d').putImageData(data,0,0);
}

function dither(imageData){
const d=imageData.data;
for(let i=0;i<d.length;i+=4){
const g=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2];
const v=g>128?255:0;
d[i]=d[i+1]=d[i+2]=v;
}
}

document.getElementById('downloadBtn').onclick=()=>{
const a=document.createElement('a');
a.download='laser.png';
a.href=canvasSingle.toDataURL();
a.click();
};
</script>

</body>
</html>
